name: Daily Blog (AEO 自動生成・自動公開)

on:
  schedule:
    # 毎日 22:23 UTC = 07:23 JST。GitHubのスケジュールは負荷で数分〜数十分遅れることがある（日次なので問題なし）。
    - cron: '23 22 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '生成本数 (1-4)'
        required: false
        default: '2'

permissions:
  contents: write

concurrency:
  group: daily-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.count || '2' }}
        run: node scripts/generate-blog.mjs

      - name: Commit & push
        run: |
          git config user.name "reliefnote-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "変更なし（生成対象が無かった等）。何もしない。"
            exit 0
          fi
          git commit -m "日次AEO記事 自動追加+sitemap ($(TZ=Asia/Tokyo date +%Y-%m-%d))"
          git push
