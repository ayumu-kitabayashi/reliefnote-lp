<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F4F1"/>
      <stop offset="100%" stop-color="#E8E5DD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#1a1a1a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装飾的な円 (薄く) -->
  <circle cx="1050" cy="120" r="180" fill="#3F453F" opacity="0.04"/>
  <circle cx="120" cy="540" r="140" fill="#3F453F" opacity="0.03"/>

  <!-- ロゴアイコン (左上) -->
  <g transform="translate(80, 80)">
    <circle cx="32" cy="32" r="32" fill="#3F453F"/>
    <path d="M22 32 L29 39 L43 25" stroke="#F5F4F1" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ブランド名 -->
  <text x="160" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif" font-size="32" font-weight="700" fill="#1a1a1a">ReliefNote</text>

  <!-- メインコピー -->
  <text x="80" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif" font-size="68" font-weight="700" fill="#1a1a1a" letter-spacing="-1">何から始めるか、</text>
  <text x="80" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif" font-size="68" font-weight="700" fill="#1a1a1a" letter-spacing="-1">もう迷わない。</text>

  <!-- サブコピー -->
  <text x="80" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif" font-size="24" font-weight="400" fill="#6b6b6b">遺族のための手続き支援サービス</text>

  <!-- アクセントライン -->
  <rect x="80" y="470" width="80" height="4" rx="2" fill="#3F453F"/>

  <!-- 数字 (右下) -->
  <g transform="translate(720, 460)">
    <text font-family="-apple-system, sans-serif" font-size="18" font-weight="600" fill="#999" letter-spacing="2">PROBLEM</text>
    <text y="44" font-family="-apple-system, sans-serif" font-size="44" font-weight="700" fill="#1a1a1a">40〜100件</text>
    <text y="76" font-family="-apple-system, sans-serif" font-size="18" fill="#6b6b6b">必要な届出・手続きの数</text>
  </g>

  <!-- フッター -->
  <text x="80" y="580" font-family="-apple-system, sans-serif" font-size="18" fill="#6b6b6b">reliefnote.jp</text>
  <text x="1120" y="580" font-family="-apple-system, sans-serif" font-size="18" fill="#6b6b6b" text-anchor="end">手続きとこころを、ひとつに。</text>
</svg>
